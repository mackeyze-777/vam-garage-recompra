<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>VAM Garage · Recompra</title>
<style>
  :root{
    --bg:#070708; --bg2:#101013; --bg3:#17171c; --border:#23232b;
    --text:#f2f2f5; --muted:#6b6b76; --muted2:#a3a3af; --accent:#e8178a; --accent2:#ff4fae;
    --green:#2bd07a; --yellow:#f0a500; --red:#ef5a60; --wa:#25d366;
    --shadow:0 12px 34px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:radial-gradient(1100px 460px at 50% -210px,rgba(232,23,138,.12),transparent),var(--bg);
    color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:15px;line-height:1.55;
    padding-bottom:48px;min-height:100vh;-webkit-font-smoothing:antialiased;}
  /* HEADER */
  header{background:rgba(16,16,19,.82);backdrop-filter:blur(12px);padding:15px 18px;display:flex;align-items:center;
    justify-content:space-between;gap:12px;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);}
  header::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:30px;height:30px;flex:0 0 auto;}
  .logo{font-size:12.5px;letter-spacing:4px;font-weight:800;text-transform:uppercase;line-height:1;}
  .logo small{display:block;font-size:8px;letter-spacing:2px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;}
  .btn-sync{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:42px;height:42px;border-radius:11px;
    font-size:16px;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s;}
  .btn-sync:hover{border-color:var(--accent);}
  .btn-sync:active{background:var(--accent);border-color:var(--accent);transform:rotate(180deg);}
  .btn-sync:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(232,23,138,.4);}
  main{padding:20px 18px;max-width:820px;margin:0 auto;}
  #app{animation:appIn .34s cubic-bezier(.22,1,.36,1) both;}
  @keyframes appIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .kpi{background:linear-gradient(165deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;}
  .kpi .v{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .kpi .l{font-size:8.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:7px;font-weight:600;}
  /* progress */
  .prog{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:18px;}
  .prog .lbl{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted2);margin-bottom:9px;}
  .prog .lbl .t{text-transform:uppercase;letter-spacing:.06em;font-size:10px;font-weight:600;}
  .prog .lbl b{color:var(--text);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;}
  .pbar{height:8px;background:var(--bg3);border-radius:6px;overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#74e6a8);border-radius:6px;transition:width .45s cubic-bezier(.22,1,.36,1);}
  /* tabs */
  nav{display:flex;gap:7px;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  nav button{background:var(--bg2);border:1px solid var(--border);color:var(--muted2);padding:10px 15px;border-radius:24px;
    font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:color .15s,background .15s,border-color .15s,transform .08s;}
  nav button:active{transform:scale(.96);}
  nav button:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(232,23,138,.35);}
  nav button.active{background:linear-gradient(90deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 5px 16px rgba(232,23,138,.32);}
  .note{font-size:12px;color:var(--muted2);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:18px;line-height:1.55;}
  .note b{color:var(--text);font-weight:600;}
  /* CARD */
  .card{position:relative;background:linear-gradient(172deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:16px;
    padding:16px;margin-bottom:13px;overflow:hidden;
    transition:transform .2s ease,box-shadow .2s ease,opacity .25s,filter .25s;}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0;background:var(--muted);}
  .card.b-ya::before{background:linear-gradient(var(--red),#ff8a8f);}
  .card.b-no::before{background:var(--yellow);}
  .card.b-fut::before{background:var(--muted);}
  .card.b-ya{background:linear-gradient(172deg,rgba(239,90,96,.05),var(--bg));}
  @media(hover:hover){.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#34343f;}}
  .card.done{opacity:.42;filter:saturate(.45);}
  .head{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  .av{width:44px;height:44px;flex:0 0 auto;border-radius:50%;background:linear-gradient(140deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;letter-spacing:-.02em;}
  .who{flex:1;min-width:0;}
  .who .nom{font-size:16px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .who .veh{font-size:12.5px;color:var(--muted2);margin-top:2px;font-weight:500;}
  .vpill{font-size:10px;font-weight:700;padding:6px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.02em;}
  .vpill.ya{background:rgba(239,90,96,.16);color:#ff8589;}
  .vpill.no{background:rgba(240,165,0,.15);color:var(--yellow);}
  .vpill.fut{background:rgba(163,163,175,.13);color:var(--muted2);}
  .info{background:var(--bg3);border-radius:11px;padding:2px 13px;margin-bottom:11px;}
  .irow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.045);}
  .irow:last-child{border-bottom:none;}
  .irow span{color:var(--muted2);font-weight:500;}
  .irow b{font-weight:600;text-align:right;}
  .ofr{font-size:13px;color:#ffaedb;background:rgba(232,23,138,.08);border:1px solid rgba(232,23,138,.22);border-radius:11px;
    padding:10px 12px;margin-bottom:13px;font-weight:600;line-height:1.45;}
  .acts{display:flex;gap:8px;flex-wrap:wrap;}
  .acts a,.acts button{flex:1;min-width:96px;min-height:46px;text-align:center;border:none;border-radius:12px;padding:12px 8px;
    font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;
    transition:transform .08s ease,filter .15s ease;}
  .acts a:hover,.acts button:hover{filter:brightness(1.08);}
  .acts a:active,.acts button:active{transform:scale(.97);}
  .acts a:focus-visible,.acts button:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(255,255,255,.18);}
  .b-wa{background:var(--wa);color:#04220f;}
  .b-call{background:var(--bg3);color:var(--text);border:1px solid var(--border)!important;}
  .b-done{background:var(--bg3);color:var(--green);border:1px solid rgba(43,208,122,.4)!important;}
  .card.done .b-done{color:var(--muted2);border-color:var(--border)!important;}
  /* states */
  .loading,.empty,.error{text-align:center;padding:56px 22px;color:var(--muted2);}
  .empty{font-size:15px;} .error{color:#ff8589;line-height:1.6;} .error a{color:var(--accent2);font-weight:700;}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:430px){.acts a,.acts button{min-width:0;}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="mark" viewBox="0 0 40 40" fill="none"><path d="M20 2L37 11v18L20 38 3 29V11L20 2z" stroke="#e8178a" stroke-width="2"/><path d="M20 11l9 5v8l-9 5-9-5v-8l9-5z" fill="#e8178a" opacity=".3"/><path d="M20 11l9 5v8l-9 5-9-5v-8l9-5z" stroke="#ff4fae" stroke-width="1.5"/></svg>
    <div class="logo">V A M&nbsp;&nbsp;G A R A G E<small>Recompra</small></div>
  </div>
  <button class="btn-sync" id="refresh" title="Actualizar" aria-label="Actualizar">↻</button>
</header>
<main>
  <div class="loading" id="loading"><div class="spinner"></div>Cargando tu lista de recompra…</div>
  <div id="app" style="display:none">
    <div class="kpis">
      <div class="kpi"><div class="v" id="k-pend" style="color:var(--red)">—</div><div class="l">Por contactar</div></div>
      <div class="kpi"><div class="v" id="k-done" style="color:var(--green)">—</div><div class="l">Ya contactados</div></div>
      <div class="kpi"><div class="v" id="k-tot">—</div><div class="l">Clientes totales</div></div>
    </div>
    <div class="prog">
      <div class="lbl"><span class="t">Avance de recompra</span><span><b id="p-done">0</b> / <span id="p-ya">0</span></span></div>
      <div class="pbar"><i id="p-bar" style="width:0%"></i></div>
    </div>
    <nav id="nav">
      <button data-f="ya" class="active">🔴 Contactar ya</button>
      <button data-f="no">🟡 Aún no toca</button>
      <button data-f="fut">📅 Futuras</button>
      <button data-f="all">Todos</button>
    </nav>
    <div class="note">Toca <b>💬 WhatsApp</b> y se abre el chat con el mensaje de mantenimiento ya escrito. Marca <b>✓ Contactado</b> al terminar — se guarda en este dispositivo y baja en la lista.</div>
    <div id="list"></div>
  </div>
</main>
<script>
const SHEET_ID='1gXh_zsj0T8hJmOO03ppswEG-YX2G1rMaE8jzdDQjvCk';
const GID='0';
const csvUrl=()=>'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&gid='+GID+'&t='+Date.now();
const DONE_KEY='vam_recompra_done';
let DONE=new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]'));
let ROWS=[], FILTER='ya';

function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false;} else cur+=c; }
    else{ if(c==='"')q=true; else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){} else cur+=c; }}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function phone(t){var n=String(t==null?'':t).replace(/\D/g,'');if(n.length===10)n='52'+n;return n;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function key(c){var p=phone(c.tel);return p||('n:'+(c.nom||'').toLowerCase());}
function initial(c){var t=(c.nom||c.veh||'?').trim();return (t[0]||'?').toUpperCase();}

function msgFor(c){
  var v=c.veh?(' de tu '+c.veh):'';
  var s=(c.serv||'').toLowerCase();
  if(/ceramic/.test(s))
    return 'Hola'+(c.nom?' '+c.nom:'')+'! 👋 Te escribo de *VAM Garage*. Ya pasaron unos meses desde que protegimos'+v+' con cerámico — te toca su *mantenimiento* (lavado especial + inspección) para que siga rindiendo y conserve la garantía. ¿Te agendo esta semana? 🚗✨';
  if(/encerado|pulido/.test(s))
    return 'Hola'+(c.nom?' '+c.nom:'')+'! 👋 Soy de *VAM Garage*. Tu'+(c.veh?' '+c.veh:' vehículo')+' ya lleva unos meses desde el pulido + encerado y la cera ya se desgastó. ¿Le damos un repulido para que vuelva a brillar como nuevo? Te puedo agendar esta semana. ✨';
  if(/interior/.test(s))
    return 'Hola'+(c.nom?' '+c.nom:'')+'! 👋 De *VAM Garage*. Ya pasó un tiempo desde el detallado de interior'+v+'. ¿Le damos otra manita para dejarlo impecable otra vez? ¿Te agendo? 🚗';
  return 'Hola'+(c.nom?' '+c.nom:'')+'! 👋 Te escribo de *VAM Garage* para dar seguimiento'+v+'. Ya te toca un mantenimiento — ¿te agendo esta semana? 🚗';
}
function wa(c){return 'https://wa.me/'+phone(c.tel)+'?text='+encodeURIComponent(msgFor(c));}
function bucket(est){ if(/CONTACTAR YA/i.test(est))return 'ya'; if(/futura/i.test(est))return 'fut'; return 'no'; }
function vencLabel(c){
  if(c.bucket==='ya'){var m=(c.est.match(/\+(\d+)m/)||[])[1];
    if(m===undefined)return 'Vencido';
    m=+m; return m===0?'Vence este mes':'Vencido +'+m+(m===1?' mes':' meses');}
  if(c.bucket==='fut')return 'Cita futura';
  return 'Aún no toca';
}

function render(){
  var list=document.getElementById('list');
  var arr=ROWS.filter(c=>FILTER==='all'?true:c.bucket===FILTER);
  arr.sort((a,b)=>(DONE.has(key(a))-DONE.has(key(b))));
  if(!arr.length){list.innerHTML='<div class="empty">✨ Nada por aquí. ¡Lista limpia!</div>';return;}
  list.innerHTML=arr.map(c=>{
    var done=DONE.has(key(c));
    var titulo=c.nom||c.veh||c.tel||'Cliente';
    return '<div class="card b-'+c.bucket+(done?' done':'')+'">'+
      '<div class="head">'+
        '<div class="av">'+esc(initial(c))+'</div>'+
        '<div class="who"><div class="nom">'+esc(titulo)+'</div>'+
          (c.nom&&c.veh?'<div class="veh">'+esc(c.veh)+'</div>':(c.tel?'<div class="veh">'+esc(c.tel)+'</div>':''))+'</div>'+
        '<span class="vpill '+c.bucket+'">'+esc(vencLabel(c))+'</span>'+
      '</div>'+
      '<div class="info">'+
        '<div class="irow"><span>🛠️ Último servicio</span><b>'+esc(c.serv||'—')+'</b></div>'+
        '<div class="irow"><span>📅 Fecha del servicio</span><b>'+esc(c.fecha||'—')+'</b></div>'+
      '</div>'+
      '<div class="ofr">💡 Ofrécele: '+esc(c.ofr||'mantenimiento')+'</div>'+
      '<div class="acts">'+
        (c.tel?'<a class="b-wa" href="'+wa(c)+'" target="_blank" rel="noopener">💬 WhatsApp</a>':'')+
        (c.tel?'<a class="b-call" href="tel:'+phone(c.tel)+'">📞 Llamar</a>':'')+
        '<button class="b-done" onclick="toggleDone(\''+key(c).replace(/'/g,"")+'\')">'+(done?'↩︎ Deshacer':'✓ Contactado')+'</button>'+
      '</div></div>';
  }).join('');
}
window.toggleDone=function(k){ if(DONE.has(k))DONE.delete(k); else DONE.add(k); localStorage.setItem(DONE_KEY,JSON.stringify([...DONE])); render(); updateKpis(); };

function updateKpis(){
  var ya=ROWS.filter(c=>c.bucket==='ya');
  var done=ya.filter(c=>DONE.has(key(c))).length;
  document.getElementById('k-pend').textContent=ya.length-done;
  document.getElementById('k-done').textContent=done;
  document.getElementById('k-tot').textContent=ROWS.length;
  document.getElementById('p-done').textContent=done;
  document.getElementById('p-ya').textContent=ya.length;
  document.getElementById('p-bar').style.width=(ya.length?Math.round(done/ya.length*100):0)+'%';
}
function activate(f){ FILTER=f; document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.f===f)); render(); }

async function load(){
  try{
    var res=await fetch(csvUrl(),{cache:'no-store'});
    var txt=await res.text();
    if(/<html|<!DOCTYPE/i.test(txt.slice(0,200))) throw new Error('priv');
    var rows=parseCSV(txt);
    var hi=rows.findIndex(r=>(r[0]||'').trim()==='Estatus');
    ROWS=[];
    for(var i=hi+1;i<rows.length;i++){
      var r=rows[i]; if(!r||!(r[0]||'').trim())continue;
      var est=(r[0]||'').trim();
      ROWS.push({est:est,bucket:bucket(est),nom:(r[1]||'').trim(),tel:(r[2]||'').trim(),veh:(r[3]||'').trim(),serv:(r[4]||'').trim(),fecha:(r[5]||'').trim(),ofr:(r[7]||'').trim()});
    }
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    updateKpis(); render();
  }catch(e){
    document.getElementById('loading').innerHTML='<div class="error">No puedo leer tu hoja de recompra.<br><br>Compártela como <b>"Cualquier persona con el enlace · Lector"</b> y dale ↻.<br><br><a href="https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit" target="_blank" rel="noopener">Abrir la hoja</a></div>';
  }
}
document.getElementById('nav').addEventListener('click',e=>{if(e.target.dataset.f)activate(e.target.dataset.f);});
document.getElementById('refresh').addEventListener('click',load);
load();
</script>
</body>
</html>
